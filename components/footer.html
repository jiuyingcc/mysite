<script>
(function(){
  var scope = document.getElementById('new-float-sidebar');
  if(!scope) return;
  var mm = window.matchMedia('(max-width: 576px)');
  function swap(isMobile){
    var imgs = scope.querySelectorAll('i img');
    imgs.forEach(function(img){
      var orig = img.getAttribute('data-src-desktop');
      if(!orig){
        img.setAttribute('data-src-desktop', img.getAttribute('src') || '');
        orig = img.getAttribute('data-src-desktop');
      }
      if(!orig) return;
      if(isMobile){
        if(orig.indexOf('/fixpic/') >= 0){
          img.setAttribute('src', orig.replace('/fixpic/','/mfix/'));
        } else if(img.src.indexOf('/fixpic/') >= 0){
          img.setAttribute('src', img.src.replace('/fixpic/','/mfix/'));
        } else {
          var file = orig.split('/').pop();
          if(file) img.setAttribute('src', '/mfix/' + file);
        }
      } else {
        img.setAttribute('src', orig);
      }
    });
  }
  function apply(e){ swap(e && 'matches' in e ? e.matches : mm.matches); }
  if(mm.addEventListener) mm.addEventListener('change', apply); else if(mm.addListener) mm.addListener(apply);
  apply(mm);
})();
</script>
